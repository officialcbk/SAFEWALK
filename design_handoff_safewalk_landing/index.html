<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SafeWalk — Walk home like someone's with you</title>
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: white; font-family: var(--font); }
  #root { width: 100%; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(127,119,221,0.3); border-radius: 4px; }
  @media (max-width: 900px) {
    h1 { font-size: 42px !important; }
    h2 { font-size: 32px !important; }
    section [style*="grid-template-columns: 1.1fr 1fr"],
    section [style*="grid-template-columns: repeat(3, 1fr)"],
    section [style*="grid-template-columns: repeat(4, 1fr)"],
    section [style*="grid-template-columns: 1.4fr 1fr 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    [style*="column-count: 3"] { column-count: 1 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens-walk.jsx"></script>
<script type="text/babel" src="screens-app.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<LandingPage/>);
</script>
</body>
</html>
